<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            margin: -20px -20px 20px -20px;
        }
        .header.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .header.failure {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .info-row {
            margin: 10px 0;
            padding: 8px;
            background: white;
            border-radius: 4px;
        }
        .label {
            font-weight: 600;
            color: #666;
            display: inline-block;
            width: 100px;
        }
        .value {
            color: #333;
        }
        .code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
        }
        .button {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
        .message {
            background: white;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #667eea;
            margin: 15px 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header {STATUS}">
        <h1>{EMOJI} {TITLE}</h1>
    </div>
    
    <div class="content">
        <div class="info-row">
            <span class="label">Repository:</span>
            <span class="value">{REPOSITORY}</span>
        </div>
        <div class="info-row">
            <span class="label">Branch:</span>
            <span class="value">{BRANCH}</span>
        </div>
        <div class="info-row">
            <span class="label">Workflow:</span>
            <span class="value">{WORKFLOW}</span>
        </div>
        <div class="info-row">
            <span class="label">Job:</span>
            <span class="value">{JOB}</span>
        </div>
        <div class="info-row">
            <span class="label">Commit:</span>
            <span class="value"><span class="code">{COMMIT}</span></span>
        </div>
        <div class="info-row">
            <span class="label">Author:</span>
            <span class="value">{AUTHOR}</span>
        </div>
    </div>

    <a href="{RUN_URL}" class="button">View Workflow Run</a>
    
    <p style="color: #666; font-size: 12px; margin-top: 30px;">
        This is an automated notification from GitHub Actions.
    </p>
</body>
</html>
