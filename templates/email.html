<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{TITLE}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background: #0d1117;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .shell {
            width: 94%;
            max-width: 680px;
            margin: 32px auto;
        }

        /* 基础链接悬停效果 */
        a.interactive-link {
            text-decoration: none;
        }
        a.interactive-link:hover {
            text-decoration: underline;
        }

        /* ── Header ── */
        .header {
            background: #161b22;
            border: 1px solid #30363d;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            padding: 32px 32px 0;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: ''; display: block;
            height: 3px;
            background: linear-gradient(90deg, #2ea043 0%, #56d364 50%, #2ea04300 100%);
            position: absolute; top: 0; left: 0; right: 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
        }

        /* 仓库名：必须加 !important 避免被邮箱客户端强行变成蓝色 */
        .repo-name {
            flex: 1;
            min-width: 0;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #8b949e !important; 
        }

        .status-badge {
            flex-shrink: 0;
            background: #1a3a25;
            color: #56d364;
            border: 1px solid #2ea043;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px; font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        /* Version Info Layout */
        .version-block {
            padding-bottom: 28px;
        }

        .version-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 46px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin: 0 0 8px 0;
            word-break: break-word;
        }

        /* 版本号：必须加 !important */
        .version-number a {
            color: #f0f6fc !important;
        }

        .released-by {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #8b949e;
            margin: 0;
        }

        /* 作者名：必须加 !important */
        .author-name {
            font-weight: 600;
            margin-right: 5px;
            color: #e6edf3 !important;
        }

        .header-fade {
            height: 32px;
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border-left: 1px solid #30363d;
            border-right: 1px solid #30363d;
        }

        /* ── Body ── */
        .body-section {
            background: #0d1117;
            border: 1px solid #30363d; border-top: none;
            padding: 0 32px 32px;
        }

        .divider {
            border: none; border-top: 1px solid #21262d;
            margin: 0 0 28px;
        }

        .notes-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 28px;
        }

        .notes-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid #21262d;
            background: #1c2128;
            border-radius: 8px 8px 0 0;
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%; background: #2ea043;
        }

        .notes-label {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #8b949e;
        }

        /* Markdown Styles Inside Email */
        .notes-body {
            padding: 20px;
            font-size: 14px;
            color: #c9d1d9;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .notes-body p { margin: 0 0 16px 0; }
        .notes-body p:last-child { margin-bottom: 0; }
        .notes-body a { color: #58a6ff; text-decoration: none; }
        .notes-body a:hover { text-decoration: underline; }
        .notes-body ul, .notes-body ol { margin: 0 0 16px 0; padding-left: 20px; }
        .notes-body li { margin-bottom: 6px; }
        .notes-body code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(110,118,129,0.4);
            padding: 2px 6px; border-radius: 4px; font-size: 13px;
        }
        .notes-body pre {
            background: #0d1117; border: 1px solid #30363d;
            padding: 12px; border-radius: 6px;
            overflow-x: auto; margin: 16px 0;
        }
        .notes-body pre code { background: transparent; padding: 0; }

        /* CTA */
        .cta-wrap { text-align: center; }

        .btn {
            display: inline-block;
            background: #238636; color: #ffffff !important;
            text-decoration: none;
            padding: 12px 28px; border-radius: 6px;
            font-weight: 600; font-size: 14px;
            border: 1px solid #2ea043;
            transition: background 0.15s;
        }

        /* ── Footer ── */
        .footer {
            background: #0d1117;
            border: 1px solid #30363d; border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 16px 32px 24px;
            text-align: center; color: #484f58; font-size: 12px;
            white-space: nowrap; 
        }

        .footer a { color: #58a6ff; text-decoration: none; }

        /* ── Responsive Mobile ── */
        @media only screen and (max-width: 600px) {
            .shell { margin: 20px auto; width: 96%; }
            .header { padding: 24px 16px 0; }
            .body-section { padding: 0 16px 24px; }
            .footer { padding: 16px 16px 20px; font-size: 11px; }
            
            .version-number { font-size: 38px; }
            .notes-body { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <div class="header-top">
                <a href="https://github.com/{REPOSITORY}" class="interactive-link repo-name" title="{REPOSITORY}">◈ {REPOSITORY}</a>
                <span class="status-badge">{STATUS_TEXT}</span>
            </div>

            <div class="version-block">
                <h1 class="version-number">
                    <a href="{RELEASE_URL}" class="interactive-link">{VERSION}</a>
                </h1>
                <div class="released-by">
                    <a href="https://github.com/{AUTHOR}" class="interactive-link author-name">{AUTHOR}</a> released this
                </div>
            </div>
        </div>

        <div class="header-fade"></div>

        <div class="body-section">
            <hr class="divider">

            <div class="notes-card">
                <div class="notes-header">
                    <div class="dot"></div>
                    <span class="notes-label">Release Notes</span>
                </div>
                <div class="notes-body">
                    {MESSAGE}
                </div>
            </div>

            <div class="cta-wrap">
                <a href="{RELEASE_URL}" class="btn">View on GitHub →</a>
            </div>
        </div>

        <div class="footer">
            Sent via Multi Release Notify
            <span style="margin: 0 6px; opacity: 0.4;">·</span>
            <a href="https://github.com/{REPOSITORY}/releases">All releases</a>
        </div>
    </div>
</body>
</html>
