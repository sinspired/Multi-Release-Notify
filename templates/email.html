<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{TITLE}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: #0d1117;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .shell {
            max-width: 620px;
            margin: 40px auto;
        }

        /* ── Header ── */
        .header {
            background: #161b22;
            border: 1px solid #30363d;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            padding: 36px 36px 0;
            position: relative;
            overflow: hidden;
        }

        /* Decorative accent bar */
        .header::before {
            content: '';
            display: block;
            height: 3px;
            background: linear-gradient(90deg, #2ea043 0%, #56d364 50%, #2ea04300 100%);
            position: absolute;
            top: 0; left: 0; right: 0;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .repo-icon {
            width: 18px;
            height: 18px;
            opacity: 0.5;
        }

        .repo-name {
            font-size: 13px;
            color: #8b949e;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .status-badge {
            margin-left: auto;
            background: #1a3a25;
            color: #56d364;
            border: 1px solid #2ea043;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .version-block {
            padding-bottom: 32px;
        }

        .version-number {
            font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
            font-size: 52px;
            font-weight: 800;
            color: #f0f6fc;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 10px;
        }

        /* Green highlight on the "v" prefix */
        .version-number .v-prefix {
            color: #2ea043;
        }

        .released-by {
            font-size: 13px;
            color: #8b949e;
            margin: 0;
        }

        .released-by strong {
            color: #e6edf3;
            font-weight: 600;
        }

        /* Separator wave / fade */
        .header-fade {
            height: 32px;
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
        }

        /* ── Body ── */
        .body-section {
            background: #0d1117;
            border: 1px solid #30363d;
            border-top: none;
            padding: 0 36px 32px;
        }

        /* Divider between header-fade and cards */
        .divider {
            border: none;
            border-top: 1px solid #21262d;
            margin: 0 0 28px;
        }

        /* Release notes card */
        .notes-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 28px;
        }

        .notes-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid #21262d;
            background: #1c2128;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ea043;
        }

        .notes-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8b949e;
        }

        .notes-body {
            padding: 18px 20px;
            font-size: 14px;
            color: #c9d1d9;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* CTA */
        .cta-wrap {
            text-align: center;
            padding-top: 4px;
        }

        .btn {
            display: inline-block;
            background: #238636;
            color: #ffffff !important;
            text-decoration: none;
            padding: 13px 30px;
            border-radius: 7px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.01em;
            border: 1px solid #2ea043;
            transition: background 0.15s;
        }

        .btn:hover {
            background: #2ea043;
        }

        .btn-arrow {
            margin-left: 6px;
            opacity: 0.75;
        }

        /* ── Footer ── */
        .footer {
            background: #0d1117;
            border: 1px solid #30363d;
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 16px 36px 20px;
            text-align: center;
            color: #484f58;
            font-size: 12px;
        }

        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .footer-sep {
            margin: 0 8px;
            opacity: 0.4;
        }
    </style>
</head>

<body>
    <div class="shell">

        <!-- Header -->
        <div class="header">
            <div class="meta-row">
                <svg class="repo-icon" viewBox="0 0 16 16" fill="#8b949e" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/>
                </svg>
                <span class="repo-name">{REPOSITORY}</span>
                <span class="status-badge">{STATUS_TEXT}</span>
            </div>

            <div class="version-block">
                <div class="version-number"><span class="v-prefix">v</span>{VERSION}</div>
                <p class="released-by">released by <strong>{AUTHOR}</strong></p>
            </div>
        </div>

        <div class="header-fade"></div>

        <!-- Body -->
        <div class="body-section">
            <hr class="divider">

            <div class="notes-card">
                <div class="notes-header">
                    <div class="dot"></div>
                    <span class="notes-label">Release Notes</span>
                </div>
                <div class="notes-body">{MESSAGE}</div>
            </div>

            <div class="cta-wrap">
                <a href="{RELEASE_URL}" class="btn">
                    View Release on GitHub <span class="btn-arrow">→</span>
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Sent automatically by GitHub Actions
            <span class="footer-sep">·</span>
            <a href="https://github.com/{REPOSITORY}/releases">All releases</a>
        </div>

    </div>
</body>

</html>
