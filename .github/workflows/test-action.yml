name: Action self-test

on:
    workflow_dispatch: {}
    push:
        branches: [main]

jobs:
    self-test:
        name: Run local action test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Run local action with realistic release metadata
              uses: ./
              with:
                  version: v1.0.0
                  release_url: https://github.com/${{ github.repository }}/releases/tag/v1.0.0
                  release_notes: |
                      ## What's new
                      - Added multi-channel release notifications for Slack, Telegram, Bark, Ntfy, and DingTalk
                      - Added automatic release title generation and template rendering
                      - Fixed URL decoration for icons and tags

                      ## Bug fixes
                      - Fixed invalid `stdout://` test URL
                      - Corrected Apprise CLI notification option handling
                  author: ${{ github.actor }}
                  urls: ntfy://multi-release-notify

                  email_url: ${{ secrets.EMAIL_APPRISE_URL }}
                  telegram_url: ${{ secrets.TELEGRAM_APPRISE_URL }}
